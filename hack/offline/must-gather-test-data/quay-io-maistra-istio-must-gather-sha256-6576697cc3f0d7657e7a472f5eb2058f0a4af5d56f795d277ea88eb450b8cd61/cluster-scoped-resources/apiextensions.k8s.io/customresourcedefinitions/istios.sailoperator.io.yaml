    singular: istio
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: The namespace for the control plane components.
      jsonPath: .spec.namespace
      name: Namespace
      type: string
    - description: The selected profile (collection of value presets).
      jsonPath: .spec.values.profile
