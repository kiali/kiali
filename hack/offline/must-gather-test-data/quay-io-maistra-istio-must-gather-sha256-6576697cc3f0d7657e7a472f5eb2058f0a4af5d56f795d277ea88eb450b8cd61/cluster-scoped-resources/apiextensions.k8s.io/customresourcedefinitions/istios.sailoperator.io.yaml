                                type: object
                            type: object
                            x-kubernetes-validations:
                            - message: At most one of [cryptomb qat] should be set
                              rule: (has(self.cryptomb)?1:0) + (has(self.qat)?1:0)
                                <= 1
                          proxyAdminPort:
                            description: |-
