                                      Defaults to true.
                                    type: boolean
                                  subject:
                                    description: Whether to forward the subject of
                                      the client cert. Defaults to true.
                                    type: boolean
                                  uri:
                                    description: |-
                                      Whether to forward the URI type Subject Alternative Name of the client cert. Defaults to
                                      true.
                                    type: boolean
                                type: object
                            type: object
                          proxyMetadata:
                            additionalProperties:
                              type: string
                            description: |-
