apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-cr-config
  namespace: ${TEMPO_NS}
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo-cr
data:
  tempo.yaml: |
    stream_over_http_enabled: true

    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
        zipkin:
          endpoint: "0.0.0.0:9411"

    storage:
      trace:
        backend: local
        wal:
          path: /data/tempo/wal
        local:
          path: /data/tempo/blocks

    usage_report:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-cr
  namespace: ${TEMPO_NS}
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo-cr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/instance: tempo-cr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/instance: tempo-cr
    spec:
      initContainers:
      - name: init-storage
        image: mirror.gcr.io/library/busybox:1.28
        command:
        - sh
        - -c
        - mkdir -p /data/tempo/wal /data/tempo/blocks /var/tempo && chmod -R 0777 /data /var/tempo
        volumeMounts:
        - name: tempo-data
          mountPath: /data
        - name: tempo-runtime
          mountPath: /var/tempo
      containers:
      - name: tempo
        image: docker.io/grafana/tempo:${TEMPO_IMAGE_TAG}
        args:
        - -config.file=/conf/tempo.yaml
        ports:
        - name: http
          containerPort: 3200
        - name: zipkin
          containerPort: 9411
        - name: otlp-grpc
          containerPort: 4317
        - name: otlp-http
          containerPort: 4318
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /conf
        - name: tempo-data
          mountPath: /data
        - name: tempo-runtime
          mountPath: /var/tempo
      volumes:
      - name: config
        configMap:
          name: tempo-cr-config
      - name: tempo-data
        emptyDir: {}
      - name: tempo-runtime
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-cr
  namespace: ${TEMPO_NS}
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo-cr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo-cr
  ports:
  - name: http
    port: 3200
    targetPort: http
  - name: zipkin
    port: 9411
    targetPort: zipkin
  - name: otlp-grpc
    port: 4317
    targetPort: otlp-grpc
  - name: otlp-http
    port: 4318
    targetPort: otlp-http
