- name: "get_action_ui"
  description: "Call this tool WHENEVER the user asks to navigate, view, show, open, or get a visual representation of resources (like graphs, lists, or details). This tool automatically redirects the user's Kiali UI. You do NOT need to analyze the output of this tool; simply call it and acknowledge to the user that you are taking them to the requested view."
  toolset: [mcp, default]
  input_schema:
    type: "object"
    required: ["resourceType"]
    properties:
      namespaces:
        type: "string"
        description: "Comma-separated list of namespaces. Use the 'page_namespaces' context if the user doesn't specify one. If empty, uses all accessible namespaces."
      resourceType:
        type: "string"
        description: "The main category of the view to open. Use 'list' for multiple resources, 'details' for a specific resource, 'graph' for topology, or 'overview' for the main dashboard."
        enum: ["service", "workload", "app", "istio", "graph", "overview", "namespaces"]
      resourceName:
        type: "string"
        description: "The specific name of the resource (e.g., 'reviews-v1'). Leave empty if the user wants a list view."
      graph:
        type: "string"
        description: "REQUIRED ONLY IF resourceType is 'graph'. Specifies the graph visualization type."
        enum: ["mesh", "traffic"]
      graphType:
        type: "string"
        description: "Granularity of the graph. Default is 'versionedApp'."
        enum: ["versionedApp", "app", "service", "workload"]
      tab:
        type: "string"
        description: "The specific tab to open when viewing resource details. Default is 'info'."
        enum: ["info", "logs", "metrics", "in_metrics", "out_metrics", "traffic", "traces", "envoy"]
