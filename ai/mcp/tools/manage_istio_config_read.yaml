- name: "manage_istio_config_read"
  description: "Read-only Istio, Gateway API, and Inference API config: list or get objects. For action 'list', returns ALL config objects in a SINGLE call grouped by namespace→'group/version/kind'→{valid:[...],invalid:[...],not_validated:[...]} (not_validated = N/A in UI; omit group/kind to get everything). Supports Istio resources (networking.istio.io, security.istio.io), Gateway API resources (gateway.networking.k8s.io), and Inference API resources (inference.networking.k8s.io) when installed on the cluster. For create, patch, or delete use manage_istio_config."
  toolset: [default, mcp]
  input_schema:
    type: "object"
    required: ["action"]
    properties:
      action:
        type: "string"
        description: "Action to perform (read-only)"
        enum: ["list", "get"]
      clusterName:
        type: "string"
        description: "Target cluster. Defaults to Kiali config cluster."
      namespace:
        type: "string"
        description: "Namespace. Optional for 'list' (defaults to all). Required for 'get'."
      group:
        type: "string"
        description: "API group of the Istio object. Required ONLY for 'get' action. For 'list', OMIT group and kind to retrieve ALL config types in a single call. Use 'gateway.networking.k8s.io' for Gateway API resources. Use 'inference.networking.k8s.io' for Inference API resources."
        enum: ["networking.istio.io", "security.istio.io", "gateway.networking.k8s.io", "inference.networking.k8s.io"]
      version:
        type: "string"
        description: "API version. Use 'v1' for all resource types. Required for 'get' action."
      kind:
        type: "string"
        description: "Kind of the Istio object. Required ONLY for 'get' action. For 'list', OMIT to return all kinds at once — do NOT call separately for each kind."
        enum: ["VirtualService", "DestinationRule", "Gateway", "ServiceEntry", "Sidecar", "WorkloadEntry", "WorkloadGroup", "EnvoyFilter", "AuthorizationPolicy", "PeerAuthentication", "RequestAuthentication", "HTTPRoute", "GRPCRoute", "ReferenceGrant", "TCPRoute", "TLSRoute", "UDPRoute", "InferencePool"]
      object:
        type: "string"
        description: "Name of the Istio object. Required for 'get' action."
      serviceName:
        type: "string"
        description: "Filter configs by service (VirtualServices, DestinationRules, Gateways). 'list' only."
