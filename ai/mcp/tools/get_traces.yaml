- name: "get_traces"
  description: "Fetches distributed traces from Jaeger/Tempo. When traceId is provided, returns a single trace with detailed summary. When searching by serviceName, returns multiple traces (up to limit) with summaries of bottlenecks and error spans."
  toolset: [default, mcp]
  input_schema:
    type: "object"
    properties:
      traceId:
        type: "string"
        description: "Trace ID to fetch and summarize. If provided, namespace/serviceName are ignored and returns a single trace."
      namespace:
        type: "string"
        description: "Kubernetes namespace of the service (required when traceId is not provided)."
      serviceName:
        type: "string"
        description: "Service name to search traces for (required when traceId is not provided). Returns multiple traces up to limit."
      errorOnly:
        type: "boolean"
        description: "If true, only consider traces that contain errors (e.g. error=true / non-200 status). Default false."
      clusterName:
        type: "string"
        description: "Optional cluster name. Defaults to the cluster name in the Kiali configuration."
      lookbackSeconds:
        type: "integer"
        description: "How far back to search when using serviceName. Default 600 (10m)."
      limit:
        type: "integer"
        description: "Maximum number of traces to return when searching by serviceName. Default 10."
      maxSpans:
        type: "integer"
        description: "Max number of spans to return in each summary section (bottlenecks, errors, roots). Default 7."
