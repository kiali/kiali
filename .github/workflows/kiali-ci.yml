name: Kiali CI

on:
  # Run on master and release branches
  push:
    branches:
    - master
    - v*.*
    paths-ignore:
    - "design/**"
    - "**/*.md"
    - "**/*.adoc"
    - "tests/evals/results/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
    - master
    - v*.*
    paths-ignore:
    - "design/**"
    - "**/*.md"
    - "**/*.adoc"
    - "tests/evals/results/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  initialize:
    permissions:
      contents: read
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      # This workflow can run on either a PR or release. GITHUB_BASE_REF is only
      # set when this workflow is run against a PR. When run against a PR, we want
      # to use the branch we are running against: GITHUB_BASE_REF. When run
      # as a release, we want to use the current branch ref: GITHUB_REF_NAME.
      target-branch: ${{ github.base_ref || github.ref_name }}
      build-branch: ${{ env.branch-master || env.branch-pr }}
    steps:
    # The initialize job gathers variables for later use in jobs.
    # We are using this technique rather environment variables because at the moment, they won't work with reusable jobs.
    # A positive side effect of this is that we can print all variables at start for debugging and troubleshooting.
    - run: echo "target-branch -> ${{ github.base_ref || github.ref_name }}"
    # For the building branch, if we are running agains a PR, we need to indicate in the branch that is coming from a PR
    - run: |
        echo "branch-version=${{ github.ref_name }}" >> $GITHUB_ENV
        echo "build-branch -> ${{ github.ref_name }}"
      id: branch-master
      if: ${{ !github.base_ref }}
    - run: |
        echo "branch-pr=refs/pull/${{ github.ref_name }}" >> $GITHUB_ENV
        echo "build-branch -> ${{ github.base_ref }}"
      id: branch-pr
      if: ${{ github.base_ref }}

  # Path filters: prefer over-running CI. Main skips:
  # - frontend-only → skip backend unit/int/codecov
  # - backend-only (no frontend/ai/hack/ci) → skip AI chatbot suite
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_backend: ${{ steps.derive.outputs.run_backend }}
      run_builds: ${{ steps.derive.outputs.run_builds }}
      run_frontend_int: ${{ steps.derive.outputs.run_frontend_int }}
      run_ai_chat: ${{ steps.derive.outputs.run_ai_chat }}
    steps:
    - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
      id: filter
      with:
        filters: |
          backend:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
            - 'Makefile'
            - 'make/**'
            - 'tests/integration/**'
            - 'deploy/**'
          ai:
            - 'ai/**'
            - 'tests/evals/**'
            - '!tests/evals/results/**'
          frontend:
            - 'frontend/**'
          hack:
            - 'hack/**'
          ci:
            - '.github/workflows/kiali-ci.yml'
            - '.github/workflows/build-backend.yml'
            - '.github/workflows/build-frontend.yml'
            - '.github/workflows/test-lint-backend.yml'
            - '.github/workflows/integration-tests-*.yml'
            - '.github/workflows/report-to-reportportal.yml'
          # Catch-all for unclassified paths (Dockerfile, .golangci.yml, …).
          other:
            - '**'
    - name: Derive job flags
      id: derive
      run: |
        backend="${{ steps.filter.outputs.backend }}"
        ai="${{ steps.filter.outputs.ai }}"
        frontend="${{ steps.filter.outputs.frontend }}"
        hack="${{ steps.filter.outputs.hack }}"
        ci="${{ steps.filter.outputs.ci }}"
        other="${{ steps.filter.outputs.other }}"
        event_name="${{ github.event_name }}"

        run_backend=true
        run_builds=true
        run_frontend_int=true
        run_ai_chat=true

        # Manual runs have no meaningful path diff; run the full suite.
        if [[ "$event_name" == "workflow_dispatch" ]]; then
          echo "event=$event_name -> full CI"
        else
          classified=false
          if [[ "$backend" == "true" || "$ai" == "true" || "$frontend" == "true" || "$hack" == "true" || "$ci" == "true" ]]; then
            classified=true
          fi
          unclassified=false
          if [[ "$other" == "true" && "$classified" == "false" ]]; then
            unclassified=true
          fi

          frontend_only=false
          if [[ "$frontend" == "true" && "$backend" != "true" && "$ai" != "true" && "$hack" != "true" && "$ci" != "true" ]]; then
            frontend_only=true
          fi

          backend_only=false
          if [[ "$backend" == "true" && "$frontend" != "true" && "$ai" != "true" && "$hack" != "true" && "$ci" != "true" ]]; then
            backend_only=true
          fi

          if [[ "$frontend_only" == "true" ]]; then
            # UI-only: still build binary + Cypress; skip backend test suites.
            run_backend=false
          elif [[ "$backend_only" == "true" ]]; then
            # Go-only (not under ai/): keep Cypress for API regressions; skip chatbot.
            run_ai_chat=false
          elif [[ "$unclassified" == "true" ]]; then
            : # full CI
          fi
          # hack/ci/ai/(frontend+backend)/mixes → full CI (default true)

          echo "backend=$backend ai=$ai frontend=$frontend hack=$hack ci=$ci other=$other"
          echo "frontend_only=$frontend_only backend_only=$backend_only unclassified=$unclassified"
        fi

        # run_builds must stay true whenever any suite runs: binary embeds frontend/build.
        echo "run_backend=$run_backend" >> "$GITHUB_OUTPUT"
        echo "run_builds=$run_builds" >> "$GITHUB_OUTPUT"
        echo "run_frontend_int=$run_frontend_int" >> "$GITHUB_OUTPUT"
        echo "run_ai_chat=$run_ai_chat" >> "$GITHUB_OUTPUT"

  test_backend:
    name: Run backend linters and unit tests
    uses: ./.github/workflows/test-lint-backend.yml
    needs: [initialize, changes]
    if: needs.changes.outputs.run_backend == 'true'
    with:
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  build_frontend:
    name: Build frontend
    uses: ./.github/workflows/build-frontend.yml
    needs: [initialize, changes]
    if: needs.changes.outputs.run_builds == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  build_backend:
    name: Build backend
    uses: ./.github/workflows/build-backend.yml
    needs: [initialize, changes, test_backend, build_frontend]
    # always(): allow build when test_backend was skipped (frontend-only).
    # Require build_frontend success (not skipped): the binary embeds
    # frontend/build. Keep run_builds true whenever any suite runs.
    if: |
      always() &&
      !cancelled() &&
      needs.changes.outputs.run_builds == 'true' &&
      (needs.test_backend.result == 'success' || needs.test_backend.result == 'skipped') &&
      needs.build_frontend.result == 'success'
    with:
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_backend_mcp:
    name: Run backend MCP integration tests
    uses: ./.github/workflows/integration-tests-backend-mcp.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_backend == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_backend:
    name: Run backend integration tests
    uses: ./.github/workflows/integration-tests-backend.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_backend == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_chat:
    name: Run frontend AI integration tests
    uses: ./.github/workflows/integration-tests-frontend-chat.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_ai_chat == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_core_1:
    name: Run frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-core-1.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_core_2:
    name: Run frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-core-2.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_core_caching:
    name: Run frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-core-caching.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_core_optional:
    name: Run frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-core-optional.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_ambient:
    name: Run Ambient frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-ambient.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_ambient_multi_primary:
    name: Run frontend Ambient Multi-Primary integration tests
    uses: ./.github/workflows/integration-tests-frontend-ambient-multi-primary.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_tempo:
    name: Run tracing frontend integration tests
    uses: ./.github/workflows/integration-tests-frontend-tempo.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_local_offline:
    name: Run frontend local and offline mode integration tests
    uses: ./.github/workflows/integration-tests-frontend-local-offline.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_backend_multicluster_external_controlplane:
    name: Run backend multicluster external-controlplane integration tests
    uses: ./.github/workflows/integration-tests-backend-multicluster-external-controlplane.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_backend == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_multicluster_primary_remote:
    name: Run frontend multicluster primary-remote integration tests
    uses: ./.github/workflows/integration-tests-frontend-multicluster-primary-remote.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_multicluster_multi_primary:
    name: Run frontend multicluster multi-primary integration tests
    uses: ./.github/workflows/integration-tests-frontend-multicluster-multi-primary.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_multicluster_external_kiali:
    name: Run frontend multicluster external-kiali integration tests
    uses: ./.github/workflows/integration-tests-frontend-multicluster-external-kiali.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  integration_tests_frontend_multi_mesh:
    name: Run frontend multi mesh integration tests
    uses: ./.github/workflows/integration-tests-frontend-multi-mesh.yml
    needs: [initialize, changes, build_backend]
    if: needs.changes.outputs.run_frontend_int == 'true'
    with:
      target_branch: ${{ needs.initialize.outputs.target-branch }}
      build_branch: ${{ needs.initialize.outputs.build-branch }}

  store_pr_metadata:
    permissions:
      contents: read
    name: Store PR metadata
    runs-on: ubuntu-latest
    needs: [initialize]
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Store PR number, target branch, and Kiali version
      run: |
        mkdir -p pr-metadata
        echo "${{ github.event.number }}" > pr-metadata/pr_number.txt
        echo "${{ github.base_ref || github.ref_name }}" > pr-metadata/target_branch.txt
        # Extract VERSION from Makefile and get major.minor (e.g., v2.21.0-SNAPSHOT -> 2.21)
        VERSION=$(grep -E '^VERSION \?=' Makefile | sed -E 's/^VERSION \?= v?([0-9]+\.[0-9]+).*/\1/')
        echo "${VERSION}" > pr-metadata/kiali_version.txt
        cat pr-metadata/pr_number.txt
        cat pr-metadata/target_branch.txt
        cat pr-metadata/kiali_version.txt

    # Upload PR metadata as artifact because workflow_run events triggered by PRs from forks
    # don't have access to PR information in github.event.workflow_run.pull_requests
    # See: https://github.com/orgs/community/discussions/25220
    - name: Upload PR metadata
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pr-metadata
        path: pr-metadata/
        retention-days: 1

  # Separate job: make test writes _output binaries that break a second checkout in the same workspace.
  codecov_upload_pr_base:
    name: Upload PR base coverage to Codecov
    needs: [changes]
    if: |
      needs.changes.outputs.run_backend == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout PR base commit
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 1
        ref: ${{ github.event.pull_request.base.sha }}

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        cache: true
        cache-dependency-path: go.sum
        go-version-file: go.mod

    - name: Run unit tests with coverage
      run: make -e GO_TEST_FLAGS="-race -coverpkg=github.com/kiali/kiali/... -coverprofile=coverage-unit.out" test

    - name: Upload PR base coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        disable_search: true
        fail_ci_if_error: true
        files: coverage-unit.out
        flags: integration
        override_branch: ${{ github.event.pull_request.base.ref }}
        override_commit: ${{ github.event.pull_request.base.sha }}
        slug: kiali/kiali
        token: ${{ secrets.CODECOV_TOKEN }}
        use_pypi: true

  codecov_merge_upload:
    if: |
      always() &&
      !cancelled() &&
      needs.changes.outputs.run_backend == 'true' &&
      needs.integration_tests_backend.result == 'success' &&
      needs.integration_tests_backend_multicluster_external_controlplane.result == 'success' &&
      needs.test_backend.result == 'success' &&
      (needs.codecov_upload_pr_base.result == 'success' || needs.codecov_upload_pr_base.result == 'skipped')
    name: Merge & Upload Coverage to Codecov
    needs:
    - changes
    - codecov_upload_pr_base
    - integration_tests_backend
    - integration_tests_backend_multicluster_external_controlplane
    - test_backend
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    # Full history is required for Codecov PR base selection and accurate comparisons.
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    # -------------------------------
    # Download artifacts
    # -------------------------------
    - name: Download backend coverage
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: coverage-backend
        path: coverage

    - name: Download multicluster coverage
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: coverage-multicluster
        path: coverage

    - name: Download unit coverage
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: coverage-unit
        path: coverage

    # -------------------------------
    # Merge coverage (no gocovmerge)
    # -------------------------------
    - name: Merge coverage files
      run: |
        echo "mode: set" > coverage.out
        grep -h -v "^mode:" coverage/coverage-unit.out >> coverage.out
        grep -h -v "^mode:" coverage/coverage-backend.out >> coverage.out
        grep -h -v "^mode:" coverage/coverage-multicluster.out >> coverage.out

    # -------------------------------
    # Upload to Codecov
    # -------------------------------
    # Select the PR base report from the target branch head (not a stale default-branch upload).
    - name: Select Codecov PR base commit
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        base_sha: ${{ github.event.pull_request.base.sha }}
        run_command: pr-base-picking
        slug: kiali/kiali
        token: ${{ secrets.CODECOV_TOKEN }}
        use_pypi: true

    # Upload on PRs and on push to master/release branches (sail-operator pattern: push + pull_request).
    - name: Upload coverage to Codecov (pull request)
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        disable_search: true
        fail_ci_if_error: true
        files: coverage.out
        flags: integration
        override_branch: ${{ github.head_ref }}
        override_commit: ${{ github.event.pull_request.head.sha }}
        override_pr: ${{ github.event.pull_request.number }}
        slug: kiali/kiali
        token: ${{ secrets.CODECOV_TOKEN }}
        use_pypi: true

    - name: Upload coverage to Codecov (push)
      if: github.event_name == 'push'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        disable_search: true
        fail_ci_if_error: true
        files: coverage.out
        flags: integration
        override_branch: ${{ github.ref_name }}
        override_commit: ${{ github.sha }}
        slug: kiali/kiali
        token: ${{ secrets.CODECOV_TOKEN }}
        use_pypi: true
