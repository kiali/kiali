name: Integration AI Tests

on:
  # Only triggered by a '/run-ai-tests' comment on a PR that has the 'ai-chatbot' label
  issue_comment:
    types: [created]

jobs:
  integration_ai_tests:
    name: Integration AI Tests
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/run-ai-tests') &&
      contains(github.event.issue.labels.*.name, 'ai-chatbot')
    runs-on: ubuntu-latest
    env:
      CI: 1
      TERM: xterm
    steps:
    - name: Get PR info
      id: pr
      run: |
        PR_URL="${{ github.event.issue.pull_request.url }}"
        PR_DATA=$(gh api "$PR_URL")
        echo "ref=$(echo "$PR_DATA" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
        echo "sha=$(echo "$PR_DATA" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set pending status on PR
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }}" \
          -f state=pending \
          -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -f description="AI integration tests running..." \
          -f context="Integration AI Tests"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.pr.outputs.ref }}

    - name: Install Helm
      uses: Azure/setup-helm@v4.3.1
      with:
        version: 'v3.18.4'

    - name: Enable corepack
      run: corepack enable

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build backend
      run: make build

    - name: Install built binary
      run: |
        mkdir -p ~/go/bin
        cp _output/kiali ~/go/bin/kiali
        chmod +x ~/go/bin/kiali

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: yarn install --frozen-lockfile

    - name: Run frontend ai integration tests
      env:
        GOOGLE_API_KEY: ${{ secrets.AI_CHATBOT_API_TOKEN }}
      run: hack/run-integration-tests.sh --test-suite ai-chatbot

    - name: Set success status on PR
      if: success()
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }}" \
          -f state=success \
          -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -f description="AI integration tests passed" \
          -f context="Integration AI Tests"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set failure status on PR
      if: failure()
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }}" \
          -f state=failure \
          -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -f description="AI integration tests failed" \
          -f context="Integration AI Tests"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: junit-frontend-ai-report
        path: frontend/cypress/results/combined-report.xml
        if-no-files-found: warn

    - name: Get debug info when integration tests fail
      if: failure()
      run: |
        mkdir debug-output
        hack/ci-get-debug-info.sh --output-directory debug-output

    - name: Upload debug info artifact
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: debug-info-${{ github.job }}
        path: debug-output

    - name: Upload cypress screenshots when tests fail
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: cypress-screenshots-${{ github.job }}
        path: frontend/cypress/screenshots
