name: Build Frontend

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      build_branch:
        required: true
        type: string

jobs:
  build_frontend:
    name: Build and unit test frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.build_branch }}

    # Corepack must be enabled before setup-node so that setup-node's
    # cache: yarn correctly detects the Yarn 4 cache directory.
    - name: Enable corepack
      run: corepack enable

    - name: Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Build
      run: make clean-all build-ui

    - name: Test frontend
      run: |
        cd frontend
        yarn pretty-quick --check --verbose --branch ${{ inputs.target_branch }}
        yarn test

    - name: Upload frontend build
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: build
        path: frontend/build/
