name: Build Frontend

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      build_branch:
        required: true
        type: string

jobs:
  build_frontend:
    name: Build and unit test frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.build_branch }}

    # Corepack must be enabled before setup-node so that setup-node's
    # cache: yarn correctly detects the Yarn 4 cache directory.
    - name: Enable corepack
      run: corepack enable

    - name: Setup node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Build
      run: make clean-all build-ui

    - name: Test frontend
      run: |
        cd frontend
        yarn pretty-quick --check --verbose --branch ${{ inputs.target_branch }}
        yarn test

    - name: Upload frontend build
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build
        path: frontend/build/
