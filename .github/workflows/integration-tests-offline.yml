name: Integration Tests Offline

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      build_branch:
        required: true
        type: string

env:
  TARGET_BRANCH: ${{ inputs.target_branch }}

jobs:
  integration_tests_offline:
    name: Offline mode integration tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.build_branch }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        # The builtin cache feature ensures that installing golangci-lint
        # is consistently fast.
        cache: true
        cache-dependency-path: go.sum

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Download go binary
      uses: actions/download-artifact@v4
      with:
        name: kiali
        path: ~/go/bin/

    - name: Ensure kiali binary is executable
      run: chmod +x ~/go/bin/kiali

    - name: Install frontend dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile

    - name: Run offline integration tests
      id: integrationTests
      run: hack/run-integration-tests.sh --test-suite offline

    - name: Get debug info when integration tests fail
      if: ${{ failure() && steps.integrationTests.conclusion == 'failure' }}
      run: |
        mkdir debug-output
        hack/ci-get-debug-info.sh --output-directory debug-output

    - name: Upload debug info artifact
      if: ${{ failure() && steps.integrationTests.conclusion == 'failure' }}
      uses: actions/upload-artifact@v4
      with:
        name: debug-info-${{ github.job }}
        path: debug-output

    - name: Upload cypress screenshots on failure
      if: ${{ failure() && steps.integrationTests.conclusion == 'failure' }}
      uses: actions/upload-artifact@v4
      with:
        name: cypress-screenshots-offline-${{ github.run_id }}
        path: frontend/cypress/screenshots
        if-no-files-found: ignore
