name: Backend Unit Tests and Linters

on:
  workflow_call:
    inputs:
      build_branch:
        required: true
        type: string
jobs:
  build_backend:
    name: Run backend unit tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.build_branch }}

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Verify code formatting
      run: |
        make format
        if [[ $(git diff --stat) != '' ]]; then
          echo "Code is not properly formatted. Please run 'make format' and commit the changes."
          git diff
          exit 1
        fi

    - name: Verify code linting
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        version: v2.12.2

    - name: Run backend unit tests with coverage
      run: |
        make -e GO_TEST_FLAGS="-race -coverpkg=github.com/kiali/kiali/... -coverprofile=coverage-unit.out" test

    - name: Verify coverage profile
      run: wc -l coverage-unit.out

    - name: Upload unit coverage artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-unit
        path: coverage-unit.out
