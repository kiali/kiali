name: Backend Unit Tests and Linters

on:
  workflow_call:
    inputs:
      build_branch:
        required: true
        type: string
jobs:
  build_backend:
    name: Run backend unit tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ inputs.build_branch }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Verify code formatting
      run: |
        make format
        if [[ $(git diff --stat) != '' ]]; then
          echo "Code is not properly formatted. Please run 'make format' and commit the changes."
          git diff
          exit 1
        fi

    - name: Verify code linting
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
      with:
        version: v2.12.2

    - name: Run backend unit tests with coverage
      run: |
        make -e GO_TEST_FLAGS="-race -coverpkg=github.com/kiali/kiali/... -coverprofile=coverage-unit.out" test

    - name: Verify coverage profile
      run: wc -l coverage-unit.out

    - name: Upload unit coverage artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-unit
        path: coverage-unit.out
