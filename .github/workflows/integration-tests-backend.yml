name: Integration Tests Backend

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      build_branch:
        required: true
        type: string
      istio_version:
        required: false
        type: string
        default: ""
      sail_operator_git_ref:
        required: false
        type: string
        default: ""

env:
  TARGET_BRANCH: ${{ inputs.target_branch }}
  # BUILD_BRANCH is used by setup-kind-in-ci.sh to locate a matching helm-charts branch.
  # If build_branch is empty, fallback to target_branch
  BUILD_BRANCH: ${{ inputs.build_branch || inputs.target_branch }}

jobs:
  integration_tests_backend:
    name: Backend API integration tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.build_branch }}

    - name: Install Helm
      uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: "v3.18.4"

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download go binary
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: kiali
        path: ~/go/bin/

    - name: Ensure kiali binary is executable
      run: chmod +x ~/go/bin/kiali

    - name: Run Backend Integration Tests
      id: intTests
      run: hack/run-integration-tests.sh --test-suite backend $(if [ -n "${{ inputs.istio_version }}" ]; then echo "--istio-version ${{ inputs.istio_version }}"; fi) $(if [ -n "${{ inputs.sail_operator_git_ref }}" ]; then echo "--sail-operator-git-ref ${{ inputs.sail_operator_git_ref }}"; fi)

    - name: Run backend controller integration tests
      run: make $(if [ -n "${ISTIO_VERSION:-${{ inputs.istio_version }}}" ]; then echo "ISTIO_VERSION=${ISTIO_VERSION:-${{ inputs.istio_version }}}"; fi) test-integration-controller

    - name: Get debug info when integration tests fail
      if: ${{ failure() && steps.intTests.conclusion == 'failure' }}
      run: |
        mkdir debug-output
        hack/ci-get-debug-info.sh --output-directory debug-output

    - name: Upload debug info artifact
      if: ${{ failure() && steps.intTests.conclusion == 'failure' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: debug-info-${{ github.job }}
        path: debug-output

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: junit-rest-report
        path: tests/integration/junit-rest-report.xml
        if-no-files-found: warn

    - name: Store test metadata
      if: always()
      run: |
        mkdir -p test-metadata
        echo "${{ inputs.istio_version }}" > test-metadata/istio_version.txt

    - name: Upload test metadata
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: backend-test-metadata
        path: test-metadata/

    - name: Upload backend coverage artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-backend
        path: tests/integration/tests/coverage-backend.out
