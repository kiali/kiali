name: MCP-Checker Evaluation

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose output"
        required: false
        type: boolean
        default: false

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}

jobs:
  check-trigger:
    name: Check if evaluation should run
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/run-mcpchecker'))
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      pr-number: ${{ steps.check.outputs.pr-number }}
      pr-sha: ${{ steps.check.outputs.pr-sha }}
      is-pr: ${{ steps.check.outputs.is-pr }}
      kubernetes-mcp-server-repo: ${{ steps.check.outputs.kubernetes_mcp_server_repo }}
    steps:
    - name: Check trigger conditions
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMENT_BODY: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
      run: |
        echo "kubernetes_mcp_server_repo=" >> $GITHUB_OUTPUT

        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq '.permission')

          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "is-pr=true" >> $GITHUB_OUTPUT
            PR_NUMBER="${{ github.event.issue.number }}"
            echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT

            PR_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
            echo "pr-sha=$PR_SHA" >> $GITHUB_OUTPUT
            echo "Pinned to SHA: $PR_SHA"

            K8S_MCP_SERVER_REPO=""
            if [[ "$COMMENT_BODY" =~ (^|[[:space:]])KUBERNETES_MCP_SERVER_REPO=([^[:space:]]+) ]]; then
              K8S_MCP_SERVER_REPO="${BASH_REMATCH[2]//[$'\n\r']/}"
              echo "Using KUBERNETES_MCP_SERVER_REPO=${K8S_MCP_SERVER_REPO}"
            fi
            echo "kubernetes_mcp_server_repo=${K8S_MCP_SERVER_REPO}" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "User ${{ github.event.comment.user.login }} does not have permission to trigger evaluations"
          fi
        else
          echo "should-run=true" >> $GITHUB_OUTPUT
          echo "is-pr=false" >> $GITHUB_OUTPUT
          echo "pr-sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

  run-evaluation:
    name: Run MCP Evaluation
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      TARGET_BRANCH: ${{ github.base_ref || github.event.repository.default_branch || 'master' }}
      BUILD_BRANCH: ${{ needs.check-trigger.outputs.pr-sha }}
      KUBERNETES_MCP_SERVER_REPO: ${{ needs.check-trigger.outputs.kubernetes-mcp-server-repo }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ needs.check-trigger.outputs.pr-sha }}

    - name: Install Helm
      uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: "v3.18.4"

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Enable corepack
      run: corepack enable

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Build frontend and backend
      run: make build-ui clean build

    - name: Setup Kind cluster, install Istio/Kiali, and start Kiali
      id: setup
      run: hack/run-integration-tests.sh --test-suite backend --mcp-tools true --setup-only true

    - name: Install MCP evaluation dependencies
      run: make mcp-install-kubernetes-mcp-server mcp-install-gemini-cli

    - name: Start kubernetes-mcp-server
      run: make mcp-start-server

    - name: Run mcpchecker evaluation
      id: mcpchecker
      uses: mcpchecker/mcpchecker/.github/actions/mcpchecker-action@d246e7ebfbb6aebcb269796af8932377f642fb2a # v0.0.18
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      with:
        eval-config: tests/evals/gemini/eval.yaml
        mcpchecker-version: latest
        output-format: json
        verbose: ${{ github.event.inputs.verbose || 'false' }}
        upload-artifacts: 'true'
        artifact-name: mcpchecker-results
        fail-on-error: 'false'
        task-pass-threshold: '0.8'
        assertion-pass-threshold: '0.0'
        working-directory: .

    - name: Normalize results path
      if: always() && steps.mcpchecker.outputs.results-file != ''
      run: |
        mkdir -p tests/evals/results
        cp "${{ steps.mcpchecker.outputs.results-file }}" tests/evals/results/mcpchecker-gemini-eval-out.json

    - name: Fail if evaluation produced no results
      if: always() && steps.mcpchecker.outputs.results-file == ''
      run: |
        echo "::error::mcpchecker did not produce a results file"
        exit 1

    - name: Fetch baseline results
      id: baseline
      if: always() && needs.check-trigger.outputs.is-pr == 'true' && hashFiles('tests/evals/results/mcpchecker-gemini-eval-out.json') != ''
      run: |
        set -euo pipefail
        git fetch origin "${DEFAULT_BRANCH}"
        BASE_TMP="$(mktemp)"
        if git show "origin/${DEFAULT_BRANCH}:tests/evals/results/mcpchecker-gemini-eval-out.json" > "${BASE_TMP}" 2>/dev/null; then
          echo "has-baseline=true" >> "$GITHUB_OUTPUT"
          echo "baseline-file=${BASE_TMP}" >> "$GITHUB_OUTPUT"
        else
          rm -f "${BASE_TMP}"
          echo "::warning::No MCP eval baseline on origin/${DEFAULT_BRANCH} (tests/evals/results/mcpchecker-gemini-eval-out.json)"
          echo "has-baseline=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run mcpchecker diff
      id: mcpchecker-diff
      if: always() && needs.check-trigger.outputs.is-pr == 'true' && steps.baseline.outputs.has-baseline == 'true' && hashFiles('tests/evals/results/mcpchecker-gemini-eval-out.json') != ''
      uses: mcpchecker/mcpchecker/.github/actions/mcpchecker-diff-action@d246e7ebfbb6aebcb269796af8932377f642fb2a # v0.0.18
      with:
        base-results: ${{ steps.baseline.outputs.baseline-file }}
        current-results: tests/evals/results/mcpchecker-gemini-eval-out.json
        mcpchecker-version: latest
        working-directory: .

    - name: Post PR evaluation comment
      if: always() && needs.check-trigger.outputs.is-pr == 'true' && hashFiles('tests/evals/results/mcpchecker-gemini-eval-out.json') != ''
      env:
        DIFF_OUTPUT: ${{ steps.mcpchecker-diff.outputs.diff-output }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        PR_NUMBER="${{ needs.check-trigger.outputs.pr-number }}"
        PR_SHA="${{ needs.check-trigger.outputs.pr-sha }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        COMMENT_FILE="$(mktemp)"
        trap 'rm -f "${COMMENT_FILE}"' EXIT

        {
          echo "## mcpchecker MCP Evaluation"
          echo ""
          echo "**Commit:** \`${PR_SHA:0:7}\` — [View full workflow run](${RUN_URL})"
          echo ""
          if [[ "${{ steps.baseline.outputs.has-baseline }}" == "true" && -n "${DIFF_OUTPUT}" ]]; then
            printf '%s\n' "${DIFF_OUTPUT}"
          else
            echo "⚠ Diff comparison not available. See [workflow run](${RUN_URL}) for evaluation results."
          fi
        } > "${COMMENT_FILE}"

        gh pr comment "${PR_NUMBER}" --repo "${{ github.repository }}" --body-file "${COMMENT_FILE}"

    - name: Cleanup
      if: always()
      run: make mcp-stop-server

  update-baseline:
    name: Update Token Baseline
    needs: [check-trigger, run-evaluation]
    permissions:
      contents: write
      pull-requests: write
    if: |
      always() &&
      needs.run-evaluation.result == 'success' &&
      needs.check-trigger.outputs.is-pr != 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout default branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ env.DEFAULT_BRANCH }}

    - name: Save previous baseline
      id: previous-baseline
      run: |
        PREVIOUS="${RUNNER_TEMP}/mcpchecker-previous-baseline.json"
        if [[ -f tests/evals/results/mcpchecker-gemini-eval-out.json ]]; then
          cp tests/evals/results/mcpchecker-gemini-eval-out.json "${PREVIOUS}"
          echo "has-previous=true" >> "$GITHUB_OUTPUT"
          echo "path=${PREVIOUS}" >> "$GITHUB_OUTPUT"
        else
          echo "has-previous=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Download mcpchecker results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: mcpchecker-results
        path: mcpchecker-results/

    - name: Update eval results baseline
      run: |
        mkdir -p tests/evals/results

        ARTIFACT_JSON="$(ls -t mcpchecker-results/mcpchecker-*-out.json 2>/dev/null | head -1 || true)"
        for candidate in \
          mcpchecker-results/tests/evals/results/mcpchecker-gemini-eval-out.json \
          mcpchecker-results/mcpchecker-gemini-eval-out.json; do
          if [[ -n "${ARTIFACT_JSON}" ]]; then
            break
          fi
          if [[ -f "${candidate}" ]]; then
            ARTIFACT_JSON="${candidate}"
            break
          fi
        done
        if [[ -z "${ARTIFACT_JSON}" ]]; then
          ARTIFACT_JSON="$(find mcpchecker-results -type f -name mcpchecker-gemini-eval-out.json | head -1)"
        fi
        if [[ -z "${ARTIFACT_JSON}" || ! -f "${ARTIFACT_JSON}" ]]; then
          echo "::error::mcpchecker-gemini-eval-out.json not found in artifact (expected under mcpchecker-results/)"
          find mcpchecker-results -type f -ls 2>/dev/null || ls -laR mcpchecker-results
          exit 1
        fi
        cp "${ARTIFACT_JSON}" tests/evals/results/mcpchecker-gemini-eval-out.json

    - name: Run baseline diff
      id: baseline-diff
      if: steps.previous-baseline.outputs.has-previous == 'true'
      uses: mcpchecker/mcpchecker/.github/actions/mcpchecker-diff-action@d246e7ebfbb6aebcb269796af8932377f642fb2a # v0.0.18
      with:
        base-results: ${{ steps.previous-baseline.outputs.path }}
        current-results: tests/evals/results/mcpchecker-gemini-eval-out.json
        mcpchecker-version: latest
        working-directory: .

    - name: Write baseline diff markdown
      env:
        DIFF_OUTPUT: ${{ steps.baseline-diff.outputs.diff-output }}
      run: |
        if [[ "${{ steps.previous-baseline.outputs.has-previous }}" == "true" && -n "${DIFF_OUTPUT}" ]]; then
          printf '%s\n' "${DIFF_OUTPUT}" > baseline-pr-diff.md
        else
          echo "_No previous committed baseline on \`${DEFAULT_BRANCH}\` at this path — first update or new file._" > baseline-pr-diff.md
        fi

    - name: Update README from baseline results
      run: |
        make mcp-update-token-readme

    - name: Create PR with updated baseline
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BRANCH="chore/update-mcp-eval-token-baseline"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git checkout -B "$BRANCH"
        git add tests/evals/results/mcpchecker-gemini-eval-out.json ai/mcp/README.md

        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "chore(evals): update MCP evaluation token baseline"
        git push -f origin "$BRANCH"

        EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || echo "")

        {
          echo "## MCP Evaluation Token Baseline Update"
          echo ""
          echo "Updates the committed MCP evaluation results (\`tests/evals/results/mcpchecker-gemini-eval-out.json\`) and the token consumption section in \`ai/mcp/README.md\` from the latest **MCP-Checker Evaluation** run on \`${DEFAULT_BRANCH}\`."
          echo ""
          echo "### mcpchecker diff (previous baseline → new baseline)"
          echo ""
          cat baseline-pr-diff.md
          echo ""
          echo "**Run details**"
          echo "- Workflow trigger commit: ${{ needs.check-trigger.outputs.pr-sha }}"
          echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "---"
          echo "*This PR was automatically generated by the MCP-Checker Evaluation workflow.*"
        } > pr-body.md

        if [ -n "$EXISTING_PR" ]; then
          echo "Updating existing PR #$EXISTING_PR"
          gh pr edit "$EXISTING_PR" --body-file pr-body.md
        else
          echo "Creating new PR"
          gh pr create \
            --title "chore: update MCP evaluation token baseline" \
            --body-file pr-body.md \
            --base "${DEFAULT_BRANCH}" \
            --head "$BRANCH"
        fi
