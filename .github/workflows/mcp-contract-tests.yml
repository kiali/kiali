name: MCP Contract Tests

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      build_branch:
        required: true
        type: string
      istio_version:
        required: false
        type: string
        default: ""
      kubernetes_mcp_server_ref:
        description: 'Git ref to checkout for containers/kubernetes-mcp-server (e.g. "main" or "refs/pull/123/head")'
        required: false
        type: string
        default: "main"
  issue_comment:
    types: [created]
  push:
    paths:
    - 'routing/routes.go'
    - 'ai/mcp/**'
    branches:
    - master
    - 'v*.*'
  pull_request:
    paths:
    - 'routing/routes.go'
    - 'ai/mcp/**'
    branches:
    - master
    - 'v*.*'
  workflow_dispatch:
    inputs:
      target_branch:
        required: false
        type: string
        default: ""
      build_branch:
        required: false
        type: string
        default: ""
      istio_version:
        required: false
        type: string
        default: ""
      kubernetes_mcp_server_ref:
        description: 'Git ref to checkout for containers/kubernetes-mcp-server (e.g. "main" or "refs/pull/123/head")'
        required: false
        type: string
        default: "main"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref }}
  cancel-in-progress: true

jobs:
  check-trigger:
    name: Check trigger
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/mcp-contract-tests'))
    outputs:
      should-run: ${{ steps.check.outputs.should_run }}
      target_branch: ${{ steps.check.outputs.target_branch }}
      build_branch: ${{ steps.check.outputs.build_branch }}
      kubernetes_mcp_server_ref: ${{ steps.check.outputs.kubernetes_mcp_server_ref }}
      istio_version: ${{ steps.check.outputs.istio_version }}
    steps:
    - name: Resolve trigger context
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq '.permission')

          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "User ${{ github.event.comment.user.login }} does not have permission to trigger MCP contract tests"
            exit 0
          fi

          PR_NUMBER="${{ github.event.issue.number }}"
          PR_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
          BASE_REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json baseRefName --jq '.baseRefName')

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "target_branch=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "build_branch=${PR_SHA}" >> "$GITHUB_OUTPUT"
          echo "kubernetes_mcp_server_ref=main" >> "$GITHUB_OUTPUT"
          echo "istio_version=" >> "$GITHUB_OUTPUT"
          echo "Pinned to PR SHA: ${PR_SHA}"
        else
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "target_branch=${{ inputs.target_branch || github.base_ref || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "build_branch=${{ inputs.build_branch || inputs.target_branch || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "kubernetes_mcp_server_ref=${{ inputs.kubernetes_mcp_server_ref || 'main' }}" >> "$GITHUB_OUTPUT"
          echo "istio_version=${{ inputs.istio_version || '' }}" >> "$GITHUB_OUTPUT"
        fi

  mcp_contract_tests:
    name: MCP Contract Tests
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ needs.check-trigger.outputs.target_branch }}
      BUILD_BRANCH: ${{ needs.check-trigger.outputs.build_branch }}
      ISTIO_VERSION: ${{ needs.check-trigger.outputs.istio_version }}
      CI: 1
      TERM: xterm
    steps:
    - name: Check out Kiali code
      uses: actions/checkout@v6
      with:
        ref: ${{ env.BUILD_BRANCH }}

    - name: Install Helm
      uses: Azure/setup-helm@v5.0.0
      with:
        version: 'v3.18.4'

    # Corepack must be enabled before setup-node so that setup-node's
    # cache: yarn correctly detects the Yarn 4 cache directory.
    - name: Enable corepack
      run: corepack enable

    # This caches the yarn deps but does not touch node_modules so it's still necessary
    # to run 'yarn install' later to link these into node_modules.
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: yarn install --immutable

    - name: Download go binary
      if: github.event_name == 'workflow_call'
      uses: actions/download-artifact@v8
      with:
        name: kiali
        path: ~/go/bin/

    - name: Build Kiali binary for standalone triggers
      if: github.event_name != 'workflow_call'
      run: make build-ui clean build

    - name: Ensure kiali binary is executable
      run: chmod +x ~/go/bin/kiali

    - name: Setup KinD cluster with Istio and Kiali
      run: |
        ISTIO_VERSION_ARG=""
        if [ -n "${ISTIO_VERSION}" ]; then
          ISTIO_VERSION_ARG="--istio-version ${ISTIO_VERSION}"
        fi
        hack/run-integration-tests.sh --test-suite backend --setup-only true ${ISTIO_VERSION_ARG}

    - name: Get Kiali external URL from MetalLB
      id: get_kiali_url
      run: |
        # Wait for Kiali LoadBalancer to get an external IP
        echo "Waiting for Kiali LoadBalancer to get external IP..."
        kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' -n istio-system service/kiali --timeout=300s

        # Get the external IP from MetalLB
        KIALI_IP=$(kubectl get svc kiali -n istio-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        if [ -z "$KIALI_IP" ]; then
          echo "ERROR: Failed to get Kiali LoadBalancer IP"
          kubectl get svc kiali -n istio-system
          exit 1
        fi

        # Kiali service uses port 80, so the URL is http://IP/kiali
        KIALI_URL="http://${KIALI_IP}/kiali"
        echo "Kiali URL: $KIALI_URL"
        echo "KIALI_URL=${KIALI_URL}" >> $GITHUB_ENV

        # Verify Kiali is accessible
        echo "Verifying Kiali is accessible at ${KIALI_URL}..."
        for i in {1..30}; do
          CURL_OUTPUT=$(curl -s -w "\nHTTP_CODE:%{http_code}" "${KIALI_URL}/api/status" 2>&1)
          HTTP_CODE=$(echo "$CURL_OUTPUT" | grep "HTTP_CODE:" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$CURL_OUTPUT" | sed '/HTTP_CODE:/d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Kiali is accessible at ${KIALI_URL}"
            break
          else
            echo "Attempt $i/30: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Curl output:"
              echo "$CURL_OUTPUT"
            fi
          fi

          if [ $i -eq 30 ]; then
            echo "ERROR: Kiali is not accessible after 30 attempts"
            echo "Final curl output:"
            echo "$CURL_OUTPUT"
            exit 1
          fi
          sleep 2
        done

    - name: Check out kubernetes-mcp-server
      uses: actions/checkout@v6
      with:
        repository: containers/kubernetes-mcp-server
        path: kubernetes-mcp-server
        ref: ${{ needs.check-trigger.outputs.kubernetes_mcp_server_ref }}

    - name: Set up Go for kubernetes-mcp-server
      uses: actions/setup-go@v6
      with:
        go-version-file: kubernetes-mcp-server/go.mod
        cache: true
        cache-dependency-path: kubernetes-mcp-server/go.sum

    - name: Run MCP contract tests
      id: contractTests
      working-directory: kubernetes-mcp-server
      env:
        KIALI_URL: ${{ env.KIALI_URL }}
      run: |
        cd pkg/kiali/tests/backend
        go test -tags kiali_contract -v ./...

    - name: Get debug info when tests fail
      if: ${{ failure() && steps.contractTests.conclusion == 'failure' }}
      run: |
        mkdir -p debug-output
        hack/ci-get-debug-info.sh --output-directory debug-output || true

    - name: Upload debug info artifact
      if: ${{ failure() && steps.contractTests.conclusion == 'failure' }}
      uses: actions/upload-artifact@v7
      with:
        name: debug-info-mcp-contract-tests
        path: debug-output
