apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: reviews
  labels:
    kiali_wizard: fault_injection
spec:
  hosts:
  - reviews.bookinfo.svc.cluster.local
  http:
  - fault:
      delay:
        fixedDelay: 5s
        percentage:
          value: 5
    route:
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v1
      weight: 33
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v2
      weight: 33
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v3
      weight: 34
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: reviews
  labels:
    kiali_wizard: fault_injection
spec:
  host: reviews.bookinfo.svc.cluster.local
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
  - name: v3
    labels:
      version: v3
