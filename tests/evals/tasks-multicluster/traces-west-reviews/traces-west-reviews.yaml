kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    multicluster: "true"
    suite: kiali
  name: "List Remote Cluster Traces"
  category: "Troubleshooting & Diagnostics"
  description: "Lists distributed traces for a service on the remote west cluster using clusterName."
  difficulty: medium
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "reviews"
  - llmJudge:
      contains: "west"
  prompt:
    inline: |
      List recent distributed traces for the reviews service in the bookinfo namespace on the west cluster.
      Summarize how many traces were found and mention any slow or error spans you see.
      Include reviews and west in your answer.
