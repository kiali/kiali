kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Get service detail"
  category: "Resource Inspection"
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "health status"
  prompt:
    inline: Get the full details for the service reviews in the namespace bookinfo.
