kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Get workload logs"
  category: "Troubleshooting & Debugging"
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "productpage"
  prompt:
    inline: Show me the last 20 log lines for the productpage-v1 workload in the bookinfo namespace.
