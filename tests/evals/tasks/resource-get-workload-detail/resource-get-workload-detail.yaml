kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Inspect Workload Details"
  category: "Resource Inspection"
  description: "Retrieves detailed status and health information for a specific workload within the mesh."
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "reviews-v1"
  prompt:
    inline: "Inspect the 'reviews-v1' workload in the 'bookinfo' namespace and provide its detailed status and health information."
