kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "get-service-detail"
  difficulty: easy
  labels:
    suite: kiali
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "service: details"
  prompt:
    inline: Give me information about my service details in the namespace bookinfo.
