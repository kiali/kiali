kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Visualize Namespace Traffic"
  category: "Traffic Observability"
  description: "Generates a traffic graph for a specific namespace to visualize service-to-service communication."
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "bookinfo"
  prompt:
    inline: "Show me the traffic topology graph for the 'bookinfo' namespace."
