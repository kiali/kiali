kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Visualize Workload-Level Topology"
  category: "Traffic Observability"
  description: "Generates a detailed workload-level traffic graph to see individual pod-to-pod communication patterns."
  difficulty: easy
spec:
  prompt:
    inline: |
      Show me a detailed workload-level traffic graph for the 'bookinfo' namespace.
      In your answer, include the word bookinfo at least once when describing the graph or namespace.
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "bookinfo"
