kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "Metrics for service (request rate)"
  category: "Resource Inspection"
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  verify:
  - llmJudge:
      contains: "productpage"
  prompt:
    inline: Show me the request rate and error rate metrics for the productpage service in the bookinfo namespace over the last 10 minutes.
