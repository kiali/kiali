kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "List DestinationRules in namespace"
  category: "Istio Configuration & Management"
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  setup:
  - k8s.create:
      apiVersion: networking.istio.io/v1
      kind: DestinationRule
      metadata:
        namespace: bookinfo
        name: ratings
        labels:
          gevals.kiali.io/test: gevals-testing
      spec:
        host: ratings.bookinfo.svc.cluster.local
        subsets:
        - name: v1
          labels:
            version: v1
  verify:
  - llmJudge:
      contains: "DestinationRule"
  prompt:
    inline: List all DestinationRules in the bookinfo namespace and report any validation errors.
