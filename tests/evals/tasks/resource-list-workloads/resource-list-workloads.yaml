kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kiali
  name: "List workloads without sidecar"
  category: "Resource Inspection"
  difficulty: easy
spec:
  requires:
  - extension: kubernetes
    as: k8s
  setup:
  - script:
      file: ./setup.sh
      timeout: 60s
  verify:
  - llmJudge:
      contains: "details-v1"
  cleanup:
  - script:
      file: ./cleanup.sh
      timeout: 60s
  prompt:
    inline: List all workloads in the bookinfo namespace that have missing sidecars.
